<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revolut · Product Space</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#FF631F; --orange-dk:#E5500F; --orange-lt:#FFF1EB; --orange-md:#FFD3C0;
  --lime:#D9F26E; --lime-ink:#3C4A14;
  --bg:#ffffff; --canvas:#FAF8F4; --bg-soft:#F5F2EC; --sidebar:#F3F0EA;
  --ink:#171410; --ink-2:#544F48; --ink-3:#928B81;
  --line:rgba(20,16,12,.09); --line-md:rgba(20,16,12,.14);
  --green:#1a7a4a; --green-lt:#e7f3ec;
  --neutral:#5b6573; --neutral-lt:#eef0f3;
  --blue:#2d6cdf; --blue-lt:#eaf0fc;
  --hero-grad:linear-gradient(115deg,#EAF0F2 0%,#F1EEF6 46%,#FBF7F1 100%);
  --ui:'Inter',sans-serif; --display:'Plus Jakarta Sans',sans-serif; --mono:'JetBrains Mono',monospace;
  --sb-w:276px;
}
html,body{height:100%}
body{font-family:var(--ui);background:var(--canvas);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit}
::selection{background:var(--orange-md)}
h1,h2,h3,.display{font-family:var(--display)}
button:focus-visible,a:focus-visible,textarea:focus-visible{outline:2px solid var(--orange);outline-offset:2px}
.scrollbar::-webkit-scrollbar{width:9px}
.scrollbar::-webkit-scrollbar-thumb{background:var(--line-md);border-radius:10px;border:2px solid transparent;background-clip:padding-box}

.app{display:grid;grid-template-columns:var(--sb-w) 1fr;height:100vh}

/* ---- SIDEBAR ---- */
.sb{background:var(--sidebar);border-right:1px solid var(--line);display:flex;flex-direction:column;height:100vh;z-index:40}
.sb-top{padding:16px 14px 8px}
.brand{display:flex;align-items:center;gap:10px;padding:4px 6px 14px}
.brand-mark{width:30px;height:30px;border-radius:50%;background:linear-gradient(180deg,#FF8A4C,#FF631F);display:grid;place-items:center;flex-shrink:0;box-shadow:0 2px 9px rgba(255,99,31,.32)}
.brand-name{font-family:var(--display);font-size:15px;font-weight:700;letter-spacing:-.02em;line-height:1.05}
.brand-name b{display:block;font-size:10px;font-weight:500;color:var(--ink-3);letter-spacing:.01em}
.new-chat{width:100%;display:flex;align-items:center;gap:9px;background:var(--orange);color:#fff;padding:11px 14px;border-radius:11px;font-weight:600;font-size:14px;box-shadow:0 1px 4px rgba(255,99,31,.28);transition:transform .12s,box-shadow .15s,background .15s}
.new-chat:hover{background:var(--orange-dk);box-shadow:0 3px 12px rgba(255,99,31,.32)}
.new-chat:active{transform:translateY(1px)}
.new-chat svg{width:16px;height:16px;stroke-width:2.4}

.sb-nav{padding:10px 10px 4px;display:flex;flex-direction:column;gap:2px}
.sb-link{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;font-size:13.5px;font-weight:500;color:var(--ink-2);width:100%;text-align:left;transition:background .14s,color .14s}
.sb-link svg{width:17px;height:17px;stroke-width:1.9;opacity:.7}
.sb-link:hover{background:rgba(20,16,12,.05);color:var(--ink)}
.sb-link.active{background:#fff;color:var(--ink);font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.sb-link.active svg{opacity:1;color:var(--orange)}
.sb-link .ct{margin-left:auto;font-size:11px;color:var(--ink-3)}

.sb-section{font-size:10.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-3);padding:15px 16px 7px;display:flex;align-items:center;justify-content:space-between}
.sb-section .add{cursor:pointer;color:var(--ink-3);font-size:15px;line-height:1}
.sb-section .add:hover{color:var(--orange)}
.proj-list{padding:0 10px}
.proj-item{display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:9px;font-size:13px;color:var(--ink-2);width:100%;text-align:left;cursor:pointer;transition:background .13s}
.proj-item:hover{background:rgba(20,16,12,.05)}
.proj-item.active{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.04)}
.proj-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.proj-item .pt{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.proj-item .pn{font-size:10px;font-family:var(--mono);color:var(--ink-3)}

.chats{flex:1;overflow-y:auto;padding:0 10px 10px}
.chat-item{display:flex;align-items:center;gap:9px;padding:7px 11px;border-radius:9px;font-size:12.5px;color:var(--ink-2);width:100%;text-align:left;cursor:pointer;transition:background .13s}
.chat-item:hover{background:rgba(20,16,12,.05)}
.chat-item.active{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.04)}
.chat-item .ci-t{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-item .ci-ico{font-size:13px;flex-shrink:0;opacity:.8}

.sb-bottom{border-top:1px solid var(--line);padding:10px}
.prod-chip{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:11px;cursor:pointer;transition:background .14s}
.prod-chip:hover{background:rgba(20,16,12,.05)}
.prod-ava{width:30px;height:30px;border-radius:9px;background:#0b0b16;display:grid;place-items:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0;font-family:var(--display)}
.prod-meta{flex:1;min-width:0;line-height:1.25}
.prod-l{font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em}
.prod-n{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prod-chip .gear{color:var(--ink-3);opacity:.6}
.user-row{display:flex;align-items:center;gap:10px;padding:9px 11px;margin-top:2px}
.user-ava{width:28px;height:28px;border-radius:50%;background:var(--ink);color:#fff;display:grid;place-items:center;font-size:11px;font-weight:600;flex-shrink:0}
.user-n{font-size:13px;font-weight:600}.user-p{font-size:11px;color:var(--ink-3)}

/* ---- MAIN ---- */
.main{display:flex;flex-direction:column;height:100vh;overflow:hidden;position:relative;background:var(--canvas)}
.topbar{height:54px;display:flex;align-items:center;gap:12px;padding:0 24px;border-bottom:1px solid var(--line);flex-shrink:0;background:rgba(250,248,244,.85);backdrop-filter:blur(8px);z-index:10}
.hamb{display:none;width:34px;height:34px;border-radius:9px;align-items:center;justify-content:center;color:var(--ink-2)}
.tb-title{font-size:14px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:8px}
.tb-title .dim{color:var(--ink-3);font-weight:500}
.tb-title .sep{color:var(--ink-3)}
.tb-model{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--ink-2);padding:6px 11px;border-radius:100px;background:#fff;border:1px solid var(--line-md)}
.tb-model .d{width:6px;height:6px;border-radius:50%;background:#22c55e}

.scroll{flex:1;overflow-y:auto;scroll-behavior:smooth}
.view{display:none}.view.active{display:block}
.page{max-width:940px;margin:0 auto;padding:26px 26px 60px;animation:rise .32s ease}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* hero (subtle gradient retained only here) */
.hero{border-radius:20px;padding:26px 28px;background:var(--hero-grad);border:1px solid var(--line);position:relative;overflow:hidden;margin-bottom:22px}
.hero-eyebrow{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--orange-dk);margin-bottom:8px}
.hero h1{font-size:28px;font-weight:700;letter-spacing:-.025em;line-height:1.08;margin-bottom:8px}
.hero p{font-size:14px;color:var(--ink-2);max-width:520px}
.online{display:inline-flex;align-items:center;gap:8px;background:var(--lime);color:var(--lime-ink);font-size:12px;font-weight:700;padding:6px 13px;border-radius:100px;position:absolute;top:24px;right:26px}
.online .av{display:flex}
.online .av span{width:20px;height:20px;border-radius:50%;border:2px solid var(--lime);color:#fff;display:grid;place-items:center;font-size:8px;font-weight:700;margin-left:-7px}
.online .av span:first-child{margin-left:0}

.block-label{font-size:13px;font-weight:700;letter-spacing:-.01em;margin:24px 0 13px;display:flex;align-items:center;gap:8px}
.block-label .all{margin-left:auto;font-size:12px;font-weight:500;color:var(--orange-dk);cursor:pointer}
.block-label .all:hover{text-decoration:underline}

/* project cards on dashboard */
.proj-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.pcard{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px 19px;text-align:left;transition:box-shadow .18s,transform .18s,border-color .15s;cursor:pointer}
.pcard:hover{box-shadow:0 8px 26px rgba(20,16,12,.08);transform:translateY(-2px);border-color:var(--line-md)}
.pcard-top{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.pcard-status{font-size:10.5px;font-weight:700;font-family:var(--mono);padding:3px 9px;border-radius:6px;display:inline-flex;align-items:center;gap:6px}
.ps-active{background:var(--green-lt);color:var(--green)}
.ps-planning{background:var(--neutral-lt);color:var(--neutral)}
.ps-done{background:var(--bg-soft);color:var(--ink-3)}
.pcard-product{margin-left:auto;font-size:11px;color:var(--ink-3);font-family:var(--mono)}
.pcard h3{font-size:16px;font-weight:700;letter-spacing:-.02em;margin-bottom:6px}
.pcard p{font-size:12.5px;color:var(--ink-2);line-height:1.5;margin-bottom:14px}
.pbar{height:6px;border-radius:5px;background:var(--bg-soft);overflow:hidden;margin-bottom:8px}
.pbar i{display:block;height:100%;background:var(--orange);border-radius:5px}
.pcard-foot{display:flex;align-items:center;justify-content:space-between}
.pcard-foot .prog{font-size:11.5px;color:var(--ink-3);font-family:var(--mono)}
.avastack{display:flex}
.avastack span{width:22px;height:22px;border-radius:50%;border:2px solid #fff;color:#fff;display:grid;place-items:center;font-size:8.5px;font-weight:700;margin-left:-6px}
.avastack span:first-child{margin-left:0}

/* quick tasks */
.quick-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.quick{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;text-align:left;display:flex;gap:13px;align-items:flex-start;transition:box-shadow .18s,transform .18s,border-color .15s}
.quick:hover{box-shadow:0 6px 20px rgba(20,16,12,.07);transform:translateY(-2px);border-color:var(--line-md)}
.quick-ico{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-size:18px;background:var(--bg-soft);border:1px solid var(--line);flex-shrink:0}
.quick-title{font-size:13.5px;font-weight:700;margin-bottom:3px;font-family:var(--display)}
.quick-desc{font-size:12px;color:var(--ink-2);line-height:1.45}
.quick-go{color:var(--ink-3);font-size:16px;align-self:center;transition:transform .15s,color .15s}
.quick:hover .quick-go{transform:translateX(3px);color:var(--orange)}

/* feed */
.feed{display:flex;flex-direction:column;gap:8px}
.feed-item{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 15px;display:flex;align-items:center;gap:13px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.feed-item:hover{border-color:var(--line-md);box-shadow:0 4px 14px rgba(20,16,12,.05)}
.feed-ico{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;font-size:16px;background:var(--bg-soft);border:1px solid var(--line);flex-shrink:0}
.feed-main{flex:1;min-width:0}
.feed-title{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.feed-meta{font-size:12px;color:var(--ink-3);margin-top:2px}
.feed-meta b{color:var(--ink-2);font-weight:600}
.feed-proj{font-size:11px;color:var(--ink-3);background:var(--bg-soft);padding:2px 8px;border-radius:6px;white-space:nowrap}
.feed-time{font-family:var(--mono);font-size:11px;color:var(--ink-3);white-space:nowrap}
.status-pill{font-size:10px;font-family:var(--mono);padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap}
.st-done{background:var(--green-lt);color:var(--green)}.st-draft{background:var(--neutral-lt);color:var(--neutral)}

/* product context card (kept, calmer) */
.ctx-card{background:linear-gradient(125deg,#1b1f3b,#3a2e63 60%,#5b3a7a);border-radius:16px;padding:22px 24px;color:#fff;position:relative;overflow:hidden;margin-top:22px}
.ctx-card::after{content:'';position:absolute;right:-50px;top:-50px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.06)}
.ctx-l{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:9px;position:relative;z-index:2}
.ctx-n{font-family:var(--display);font-size:22px;font-weight:700;letter-spacing:-.02em;margin-bottom:6px;position:relative;z-index:2}
.ctx-d{font-size:13px;color:rgba(255,255,255,.8);line-height:1.55;max-width:540px;position:relative;z-index:2}
.ctx-tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px;position:relative;z-index:2}
.ctx-tag{font-size:11.5px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);padding:4px 11px;border-radius:100px}
.ctx-edit{position:absolute;top:18px;right:20px;z-index:3;font-size:12px;color:#fff;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.2);padding:6px 13px;border-radius:9px;font-weight:600}
.ctx-edit:hover{background:rgba(255,255,255,.22)}

/* ===== PROJECT VIEW ===== */
.proj-hero{border-radius:18px;border:1px solid var(--line);background:#fff;padding:24px 26px;margin-bottom:22px;position:relative}
.proj-back{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:500;color:var(--ink-3);margin-bottom:14px}
.proj-back:hover{color:var(--orange)}
.proj-back svg{width:14px;height:14px}
.proj-hero-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.proj-hero h1{font-size:25px;font-weight:700;letter-spacing:-.025em;width:100%;margin-bottom:6px}
.proj-hero .goal{font-size:14px;color:var(--ink-2);line-height:1.6;max-width:620px;margin-bottom:18px}
.proj-meta-row{display:flex;align-items:center;gap:22px;flex-wrap:wrap;padding-top:16px;border-top:1px solid var(--line)}
.pm-block .l{font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-3);margin-bottom:5px}
.pm-block .v{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.proj-actions{position:absolute;top:24px;right:26px;display:flex;gap:9px}
.proj-prog{flex:1;min-width:160px}
.proj-prog .pbar{margin-top:6px;margin-bottom:0}

/* artifacts table */
.av-head{margin-bottom:18px}
.av-head .eb{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--orange-dk);margin-bottom:7px}
.av-head h1{font-size:26px;font-weight:700;letter-spacing:-.025em}
.av-head p{font-size:14px;color:var(--ink-2);margin-top:7px;max-width:560px}
.av-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.av-f{padding:7px 14px;border-radius:100px;font-size:12.5px;font-weight:500;border:1px solid var(--line-md);background:#fff;color:var(--ink-2)}
.av-f.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.hist{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden}
.hist-row{display:grid;grid-template-columns:1fr 150px 150px 110px 84px;gap:14px;align-items:center;padding:13px 18px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .14s}
.hist-row:last-child{border-bottom:none}
.hist-row:hover{background:var(--bg-soft)}
.hist-row.head{cursor:default;background:var(--bg-soft);font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-3);font-weight:600}
.hist-name{display:flex;align-items:center;gap:11px;min-width:0}
.hist-name .hi{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;font-size:15px;flex-shrink:0;background:var(--bg-soft);border:1px solid var(--line)}
.hist-name-t{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-name-s{font-size:11.5px;color:var(--ink-3)}
.hist-author{font-size:12.5px;color:var(--ink-2);display:flex;align-items:center;gap:8px}
.hist-proj{font-size:12px;color:var(--ink-2)}
.mini-ava{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-size:9px;font-weight:700;color:#fff}
.hist-date{font-family:var(--mono);font-size:11.5px;color:var(--ink-3)}
@media(max-width:980px){.hist-row{grid-template-columns:1fr 130px 84px}.hist-proj,.hist-date{display:none}}

/* ===== CHAT ===== */
.thread-wrap{flex:1;overflow-y:auto;scroll-behavior:smooth}
.thread{max-width:760px;margin:0 auto;padding:26px 24px 200px;display:flex;flex-direction:column;gap:24px}
.proj-banner{max-width:760px;margin:14px auto -6px;padding:0 24px}
.proj-banner .pb{display:inline-flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-2);background:#fff;border:1px solid var(--line);padding:6px 12px;border-radius:9px;cursor:pointer}
.proj-banner .pb:hover{border-color:var(--line-md)}
.proj-banner .pb .dot{width:7px;height:7px;border-radius:50%}
.msg{display:flex;gap:13px;animation:rise .32s ease}
.msg-ava{width:30px;height:30px;border-radius:9px;flex-shrink:0;display:grid;place-items:center}
.msg-ava.ai{background:var(--orange)}
.msg-ava.ai svg{width:16px;height:16px}
.msg-ava.me{font-size:11px;font-weight:600;border-radius:50%;color:#fff}
.msg-body{flex:1;min-width:0;padding-top:3px}
.msg.user{justify-content:flex-end}
.msg.user .msg-body{flex:0 1 auto;max-width:80%}
.bubble{background:#fff;border:1px solid var(--line);border-radius:15px 15px 4px 15px;padding:11px 15px;font-size:14.5px;line-height:1.55}
.msg.user .task-tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--orange-dk);background:var(--orange-lt);border:1px solid var(--orange-md);padding:3px 9px;border-radius:7px;margin-bottom:7px}
.ai-text{font-size:14.5px;line-height:1.65}
.ai-text p{margin-bottom:10px}.ai-text p:last-child{margin-bottom:0}
.ai-text strong{font-weight:600}
.ai-text ul{list-style:none;margin:6px 0 10px;display:flex;flex-direction:column;gap:5px}
.ai-text ul li{padding-left:18px;position:relative;font-size:14px;color:var(--ink-2)}
.ai-text ul li::before{content:'';position:absolute;left:5px;top:9px;width:5px;height:5px;border-radius:50%;background:var(--orange)}
.suggest-task{margin-top:10px;display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line-md);background:#fff;padding:7px 13px;border-radius:10px;font-size:13px;font-weight:500;transition:border-color .14s,background .14s}
.suggest-task:hover{border-color:var(--orange);background:var(--orange-lt)}
.typing{display:flex;gap:5px;padding:6px 0}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--ink-3);animation:blink 1.3s infinite both}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.25;transform:translateY(0)}40%{opacity:1;transform:translateY(-3px)}}

.art{border:1px solid var(--line-md);border-radius:16px;overflow:hidden;background:#fff;margin-top:6px;box-shadow:0 4px 18px rgba(20,16,12,.06)}
.art-head{display:flex;align-items:center;gap:11px;padding:13px 16px;border-bottom:1px solid var(--line);background:var(--bg-soft)}
.art-ico{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;font-size:16px;background:#fff;border:1px solid var(--line)}
.art-h-meta{flex:1;min-width:0}
.art-h-title{font-size:13.5px;font-weight:700;font-family:var(--display);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.art-h-sub{font-size:11px;color:var(--ink-3);font-family:var(--mono)}
.art-h-actions{display:flex;gap:5px}

    <h2><span class="n">02</span> Цели</h2><ul><li>Чтобы деньги приносили доход</li><li>Сохранить мгновенный доступ к средствам</li><li>Не разбираться в сложных продуктах</li></ul>
    <h2><span class="n">03</span> Боли</h2><ul><li>Остаток лежит без процента</li><li>Вклады «запирают» деньги</li></ul>
    <h2><span class="n">04</span> Возражения</h2><ul><li>«А вдруг не смогу быстро снять?»</li><li>«Маленький процент — не стоит возни»</li></ul>`;},
  copy(b){return`<h2><span class="n">Hero</span></h2><p><b>H1:</b> <span class="editable" contenteditable="true">Деньги на карте, которые работают каждый день</span></p>
    <p><b>Подзаголовок:</b> <span class="editable" contenteditable="true">Накопительный счёт прямо в карте Revolut. Ежедневные проценты, снятие в любой момент — без блокировок.</span></p><p><b>CTA:</b> Открыть счёт за минуту</p>
    <h2><span class="n">Боль</span></h2><ul><li>Остаток просто лежит без дохода</li><li>Вклады «запирают» деньги</li><li>Накопления в отдельном приложении</li></ul>
    <h2><span class="n">Как</span></h2><ul><li>Проценты начисляются каждый день</li><li>Снимайте когда нужно</li><li>Всё в одном экране с картой</li></ul>`;},
  desk(b){const topic=b||'рынок накопительных продуктов необанков';return`<p>Кабинетное исследование: <b>${esc(topic)}</b>. Источники — прайсы конкурентов, отзывы сторов, отчёты.</p>
    <h2><span class="n">01</span> Размер и динамика</h2><ul><li>Спрос на гибкие сбережения с мгновенным доступом растёт</li><li>Ставки стали аргументом переключения между необанками</li><li>Связка «карта + накопления» — заметный тренд</li></ul>
    <h2><span class="n">02</span> Ключевые находки</h2><div class="tbl"><table><tr><th>Тема</th><th>Находка</th><th>Источник</th></tr>
    <tr><td>Драйвер</td><td>Ставка + мгновенное снятие</td><td>Отзывы App Store</td></tr>
    <tr><td>Барьер</td><td>Страх блокировки средств</td><td>Reddit / форумы</td></tr>
    <tr><td>Тренд</td><td>Round-up откладывание с трат</td><td>Обзоры финтеха</td></tr></table></div>
    <h2><span class="n">03</span> Выводы</h2><ul><li>Гибкость снятия — ключевой дифференциатор</li><li>Проверить чувствительность к размеру ставки в интервью</li></ul>
    <div class="box"><b>Ограничение:</b> desk research даёт направление; готовность держать деньги подтверждается только разговорами.</div>`;},
  synth(b){return`<p>Синтез по заметкам интервью${b?`: <b>${esc(b)}</b>`:''}. Affinity-темы с частотой.</p>
    <h2><span class="n">01</span> Темы по частоте</h2><div class="tbl"><table><tr><th>Тема</th><th>Частота</th><th>Сигнал</th></tr>
    <tr><td class="strong">Боятся, что деньги «запрут»</td><td>9 / 12</td><td><span class="pill p-hi">сильный</span></td></tr>
    <tr><td class="strong">Хотят процент на остаток</td><td>8 / 12</td><td><span class="pill p-hi">сильный</span></td></tr>
    <tr><td class="strong">Не хотят отдельного приложения</td><td>6 / 12</td><td><span class="pill p-mid">средний</span></td></tr>
    <tr><td class="strong">Ставка должна быть «заметной»</td><td>4 / 12</td><td><span class="pill p-lo">слабее</span></td></tr></table></div>
    <h2><span class="n">02</span> Показательные цитаты</h2><ul><li>«Деньги просто лежат, но снять должен мочь в любой момент» <i>— перефразировано</i></li><li>«Отдельный вклад не открою — лень и страшно» <i>— перефразировано</i></li></ul>
    <h2><span class="n">03</span> Инсайты и рекомендации</h2><ul><li>Гибкость снятия — выносить в коммуникацию №1</li><li>Накопления встроить в экран карты, не делать отдельным продуктом</li><li>Подсветить «ежедневное начисление» как доказательство</li></ul>`;},
  custdev(b){const h=b||'Барьер к накоплениям — страх потерять доступ к деньгам, а не размер ставки';return`
    <div class="box"><b>Проверяемая гипотеза:</b> ${esc(h)}</div>
    <h2><span class="n">01</span> Цель</h2><p>Понять реальный барьер к накоплениям. Про их деньги и привычки, без презентации фичи.</p>
    <h2><span class="n">02</span> Разогрев</h2><ul><li>Где сейчас держите остаток и почему именно там?</li><li>Открывали ли вклады? Что понравилось / оттолкнуло?</li></ul>
    <h2><span class="n">03</span> Проблемный блок <span class="pill p-hi">ядро</span></h2><ul><li>Что должно быть, чтобы вы держали деньги у нас?</li><li>Был случай, когда деньги были нужны срочно, а они «заперты»?</li><li>Что важнее — ставка повыше или возможность снять в любой момент?</li></ul>
    <h2><span class="n">04</span> Как анализировать</h2><div class="tbl"><table><tr><th>Сигнал</th><th>Что значит</th></tr><tr><td>Называет страх блокировки</td><td>Барьер — доступ, не ставка</td></tr><tr><td>Готов на меньший %, но с гибкостью</td><td>Гибкость — ядро ценности</td></tr><tr><td>«Дайте максимум ставку»</td><td>Сегмент про доходность</td></tr></table></div>
    <div class="box"><b>Критерий:</b> 7/12 ставят доступ выше ставки → коммуникация про гибкость, а не про процент.</div>`;},
  survey(b){return`<p>Анализ опроса${b?`: <b>${esc(b)}</b>`:''}. n = 286, держатели карты.</p>
    <h2><span class="n">01</span> Ключевые метрики</h2><div class="tbl"><table><tr><th>Показатель</th><th>Значение</th></tr><tr><td>Держат остаток без дохода</td><td>68%</td></tr><tr><td>Главное — мгновенное снятие</td><td>61%</td></tr><tr><td>Откроют счёт, если он в той же карте</td><td>57%</td></tr></table></div>
    <h2><span class="n">02</span> По сегментам</h2><ul><li><b>Сберегатели:</b> важна ставка</li><li><b>Транжиры:</b> заходит round-up «копит за меня»</li></ul>
    <h2><span class="n">03</span> Действия</h2><ul><li>Запуск встроенного счёта — приоритет</li><li>Коммуникация «деньги под рукой» снимает топ-барьер</li></ul>`;},
  discovery(b){return`<p>Discovery-план${b?`: <b>${esc(b)}</b>`:''}. Что проверяем перед запуском накопительного счёта.</p>
    <h2><span class="n">01</span> По проблеме</h2><ul><li>Что мешает держать остаток у нас: доступ, доверие или ставка?</li><li>У кого барьер ниже — сберегатели или транжиры?</li></ul>
    <h2><span class="n">02</span> По продукту</h2><ul><li>Какой формат воспринимается как «надёжно и доступно»?</li><li>Что важнее — ставка или гибкость снятия?</li></ul>
    <h2><span class="n">03</span> По рынку</h2><ul><li>Ставки конкурентов и регуляторные ограничения?</li><li>Где спрос выше по странам?</li></ul>
    <h2><span class="n">04</span> По конкурентам</h2><ul><li>Как Monzo/N26 связывают карту и накопления?</li><li>Есть ли неочевидные альтернативы?</li></ul>`;},
  sql(b){return`<p>Запрос под вопрос: <b>${esc(b||'воронка открытия накопительного счёта держателями карты')}</b>.</p>
    <div class="codeblock"><span class="c">-- Доля держателей карты, открывших накопительный счёт, по неделям</span>\n<span class="k">SELECT</span>\n  date_trunc(<span class="s">'week'</span>, c.first_card_at)        <span class="k">AS</span> cohort_week,\n  count(<span class="k">DISTINCT</span> c.user_id)                 <span class="k">AS</span> card_holders,\n  count(<span class="k">DISTINCT</span> s.user_id)                 <span class="k">AS</span> opened_savings,\n  <span class="f">round</span>(100.0 * count(<span class="k">DISTINCT</span> s.user_id)\n        / nullif(count(<span class="k">DISTINCT</span> c.user_id), 0), 1) <span class="k">AS</span> pct_opened\n<span class="k">FROM</span> card_holders c\n<span class="k">LEFT JOIN</span> savings_accounts s\n  <span class="k">ON</span> s.user_id = c.user_id\n <span class="k">AND</span> s.opened_at &lt; c.first_card_at + <span class="k">interval</span> <span class="s">'30 days'</span>\n<span class="k">GROUP BY</span> 1\n<span class="k">ORDER BY</span> 1;</div>
    <h2><span class="n">01</span> Что покажет</h2><ul><li>Конверсию «держатель карты → открыл счёт» в первые 30 дней</li><li>Динамику по недельным когортам — растёт ли adoption</li><li>Базу для сравнения до/после запуска промо</li></ul>
    <div class="box"><b>Дальше:</b> разложить pct_opened по сегментам (остаток на карте, страна) — где конверсия проседает.</div>`;},
  metrics(b){return`<p>Tracking plan для: <b>${esc(b||'накопительный счёт')}</b>. Что логировать, чтобы потом всё посчитать.</p>
    <div class="tbl"><table><tr><th>Событие</th><th>Когда</th><th>Свойства</th></tr>
    <tr><td class="strong">savings_promo_viewed</td><td>Показ промо в приложении</td><td>placement, balance_bucket</td></tr>
    <tr><td class="strong">savings_open_started</td><td>Открыл экран оформления</td><td>source</td></tr>
    <tr><td class="strong">savings_account_opened</td><td>Счёт создан</td><td>initial_amount, currency</td></tr>
    <tr><td class="strong">savings_topup</td><td>Пополнение</td><td>amount, method (manual/roundup)</td></tr>
    <tr><td class="strong">savings_withdraw</td><td>Снятие</td><td>amount, time_to_withdraw</td></tr>
    <tr><td class="strong">daily_interest_accrued</td><td>Ежедневное начисление</td><td>amount, balance</td></tr></table></div>
    <div class="box"><b>Принцип:</b> событие = факт, свойства = разрезы для анализа. Без balance_bucket нельзя будет связать adoption с размером остатка.</div>`;},
  abtest(b){return`<p>Дизайн эксперимента: <b>${esc(b||'промо накопительного счёта на главном экране')}</b>.</p>
    <h2><span class="n">01</span> Гипотеза</h2><div class="box"><span class="editable" contenteditable="true">Если показать держателям карты с остатком промо «деньги работают каждый день», конверсия в открытие счёта вырастет, потому что снимается барьер «деньги просто лежат».</span></div>
    <h2><span class="n">02</span> Варианты</h2><ul><li><b>Control:</b> текущий экран без промо</li><li><b>Variant:</b> карточка промо с акцентом на гибкое снятие</li></ul>
    <h2><span class="n">03</span> Метрики</h2><div class="tbl"><table><tr><th>Тип</th><th>Метрика</th></tr><tr><td>Primary</td><td>% открывших счёт за 14 дней</td></tr><tr><td>Secondary</td><td>Средний первый пополнения</td></tr><tr><td>Guardrail</td><td>Удержание, жалобы в поддержку</td></tr></table></div>
    <h2><span class="n">04</span> Мощность</h2><ul><li>Базовая конверсия ~8%, MDE +1,5 п.п.</li><li>≈ 11 000 на вариант, α=0,05, power=0,8</li><li>Длительность: ~2 недели при текущем трафике</li></ul>
    <div class="box"><b>Стоп-условие:</b> срабатывание guardrail (рост жалоб/падение удержания) — останавливаем досрочно.</div>`;},
  cohort(b){return`<p>Когортный анализ: <b>${esc(b||'удержание открывших накопительный счёт')}</b>. Доля активных по неделям после открытия.</p>
    <div class="tbl"><table><tr><th>Когорта</th><th>W0</th><th>W1</th><th>W2</th><th>W4</th></tr>
    <tr><td class="strong">Апрель</td><td>100%</td><td>82%</td><td>74%</td><td>68%</td></tr>
    <tr><td class="strong">Май</td><td>100%</td><td>85%</td><td>78%</td><td>72%</td></tr>
    <tr><td class="strong">Июнь (промо)</td><td>100%</td><td>88%</td><td>83%</td><td>—</td></tr></table></div>
    <h2><span class="n">01</span> Интерпретация</h2><ul><li>Июньская когорта (с промо про гибкость) держится лучше — барьер «деньги заперты» снят</li><li>Основной отвал — W0→W1; усилить онбординг первого пополнения</li></ul>
    <div class="box"><b>Действие:</b> подтянуть W0→W1 через round-up по умолчанию — он создаёт привычку пополнять.</div>`;},
  funnel(b){return`<p>Воронка: <b>${esc(b||'открытие накопительного счёта')}</b>.</p>
    <div class="tbl"><table><tr><th>Шаг</th><th>Пользователей</th><th>Конверсия</th></tr>
    <tr><td class="strong">Увидел промо</td><td>100 000</td><td>—</td></tr>
    <tr><td class="strong">Открыл экран</td><td>32 000</td><td>32%</td></tr>
    <tr><td class="strong">Начал оформление</td><td>18 500</td><td>58%</td></tr>
    <tr><td class="strong">Открыл счёт</td><td>11 200</td><td>61%</td></tr>
    <tr><td class="strong">Пополнил</td><td>7 800</td><td>70%</td></tr></table></div>
    <h2><span class="n">01</span> Узкие места</h2><ul><li><span class="pill p-hi">−68%</span>Промо → экран: слабый оффер или плейсмент</li><li><span class="pill p-mid">−42%</span>Экран → оформление: много полей / трение</li></ul>
    <div class="box"><b>Приоритет:</b> сначала шаг «промо → экран» — там теряем больше всего; тест оффера про гибкое снятие.</div>`;},
  codereview(b){return`<p>Ревью PR: <b>${esc(b||'экран накопительного счёта')}</b>. Замечания по важности.</p>
    <div class="codeblock"><span class="c">// SavingsBalance.tsx — расчёт начисленных процентов</span>\n<span class="k">function</span> <span class="f">accruedInterest</span>(balance, rateAnnual) {\n  <span class="k">return</span> balance * rateAnnual / 365;   <span class="c">// ⚠ округление и валюта?</span>\n}</div>
    <h2><span class="n">01</span> Замечания</h2><ul>
    <li><span class="pill p-hi">блокер</span>Деньги в float — потеря копеек при начислении. Хранить в минорных единицах (центах), считать в целых.</li>
    <li><span class="pill p-mid">важно</span>Захардкожен 365 — не учитывает високосный год; вынести в конфиг расчётной базы.</li>
    <li><span class="pill p-mid">важно</span>Нет обработки состояния загрузки/ошибки баланса — добавить skeleton и retry.</li>
    <li><span class="pill p-lo">мелочь</span>Магические числа в UI вынести в токены, дублируется форматирование валюты.</li></ul>
    <h2><span class="n">02</span> Что хорошо</h2><ul><li>Компонент чистый, логика отделена от представления</li><li>Есть типы на пропсы</li></ul>
    <div class="box"><b>Вердикт:</b> запросить изменения — блокер по деньгам в float обязателен до мёрджа.</div>`;},
  techspec(b){return`<p>RFC: <b>${esc(b||'накопительный счёт при дебетовой карте')}</b>.</p>
    <h2><span class="n">01</span> Контекст</h2><p>Держатели карты держат остаток без дохода. Нужен встроенный счёт с ежедневными процентами и мгновенным снятием.</p>
    <h2><span class="n">02</span> Цели / не-цели</h2><ul><li><b>Цели:</b> открытие в 2 тапа, ежедневное начисление, снятие без задержек</li><li><b>Не-цели:</b> срочные вклады с блокировкой, инвестиционные продукты</li></ul>
    <h2><span class="n">03</span> Дизайн</h2><ul><li>Сервис savings: счета, начисления, переводы карта↔счёт</li><li>Ежедневный джоб начисления (идемпотентный, по дню)</li><li>Хранение сумм в минорных единицах (int), без float</li></ul>
    <h2><span class="n">04</span> Модель данных</h2><div class="tbl"><table><tr><th>Таблица</th><th>Ключевые поля</th></tr><tr><td class="strong">savings_account</td><td>id, user_id, currency, balance_minor, rate_bps, opened_at</td></tr><tr><td class="strong">interest_accrual</td><td>account_id, date, amount_minor (uniq: account+date)</td></tr></table></div>
    <h2><span class="n">05</span> Риски и выкат</h2><ul><li>Точность начислений → тесты на округление, аудит-лог</li><li>Выкат под фичефлагом на 5% → 50% → 100%</li></ul>`;},
  apispec(b){return`<p>API-контракт: <b>${esc(b||'накопительный счёт')}</b>. Черновик для бэкенда и мобайла.</p>
    <div class="tbl"><table><tr><th>Метод</th><th>Путь</th><th>Назначение</th></tr>
    <tr><td class="strong">POST</td><td>/v1/savings/accounts</td><td>Открыть счёт</td></tr>
    <tr><td class="strong">GET</td><td>/v1/savings/accounts/{id}</td><td>Баланс и ставка</td></tr>
    <tr><td class="strong">POST</td><td>/v1/savings/accounts/{id}/topup</td><td>Пополнить с карты</td></tr>
    <tr><td class="strong">POST</td><td>/v1/savings/accounts/{id}/withdraw</td><td>Снять на карту</td></tr></table></div>
    <h2><span class="n">01</span> Пример ответа</h2>
    <div class="codeblock"><span class="c">// GET /v1/savings/accounts/{id}</span>\n{\n  <span class="s">"id"</span>: <span class="s">"sav_8f2a"</span>,\n  <span class="s">"currency"</span>: <span class="s">"EUR"</span>,\n  <span class="s">"balance_minor"</span>: 324018,        <span class="c">// €3 240,18</span>\n  <span class="s">"rate_bps"</span>: 450,               <span class="c">// 4,50%</span>\n  <span class="s">"interest_today_minor"</span>: 40,\n  <span class="s">"withdrawable"</span>: <span class="k">true</span>\n}</div>
    <div class="box"><b>Договорённость:</b> все суммы — целые в минорных единицах + поле currency. Никаких float на стыке систем.</div>`;},

function freeReply(text){const t=text.toLowerCase();let route=null;
  if(/конкурент|monzo|n26|wise|nubank|сравни/.test(t))route='comp';
  else if(/интервью|синтез|заметк/.test(t))route='synth';
  else if(/gtm|запуск|вывод/.test(t))route='gtm';
  else if(/jtbd|job|боль/.test(t))route='jtbd';
  else if(/лендинг|landing|страниц/.test(t))route='landing';
  else if(/мобил|приложен|экран|компонент/.test(t))route='mobile';
  else if(/desk|рынок|кабинет/.test(t))route='desk';
  else if(/визуал|баннер|график/.test(t))route='visual';
  else if(/гипотез/.test(t))route='hyp';
  else if(/стратег|primary|удержан|накоп/.test(t))route='strategy';
  const intro=`<p>Смотрю в контексте продукта <strong>${esc(P().name)}</strong>${state.activeProject?` и проекта «${esc(getProj(state.activeProject).name)}»`:''}.</p>`;
  const body=`<p>Как бы я подошёл:</p><ul><li>Зафиксировать сегмент держателей карты с остатком</li><li>Опереться на гибкость снятия — это наш дифференциатор</li><li>Главная цель — превратить карту в primary через накопления</li></ul><p>Могу развернуть или оформить структурным артефактом через задачу.</p>`;
  let suggest='';if(route){const s=SKILLS[route];suggest=`<button class="suggest-task" onclick="armAndPrefill('${route}','${esc(text).replace(/'/g,'’')}')"><span>${s.ico}</span> Оформить задачей «${s.name}»</button>`;}
  return intro+body+suggest;}

  ['dashboard','artifacts','tasks'].forEach(n=>{const b=document.getElementById('nav-'+n);if(b)b.classList.toggle('active',n===v);});

function send(){
  const inp=document.getElementById('input');const text=inp.value.trim();const skill=state.armed;
  if(!text&&!skill)return;
  const userText=text||`Запусти задачу «${SKILLS[skill].name}»`;
  if(!state.current){const pid=state.activeProject;state.current={id:uid(),title:'',messages:[],when:'сейчас',ico:skill?SKILLS[skill].ico:'💬',projectId:pid};state.chats.unshift(state.current);if(pid){const p=getProj(pid);if(p)p.chatIds.unshift(state.current.id);}}
  const c=state.current;
  if(!c.title){c.title=text?text.slice(0,42):SKILLS[skill].name;if(skill)c.ico=SKILLS[skill].ico;}
  c.messages.push({role:'user',text:userText,skill:skill});
  inp.value='';autoGrow(inp);toggleSend();const used=skill;disarm();
  renderThread();renderChats();renderProjList();
  c.messages.push({role:'thinking'});renderThread();
  setTimeout(()=>{c.messages.pop();
    if(used){const s=SKILLS[used];const brief=text;const body=s.kind==='doc'?`<div class="doc">${DOC[used](brief)}</div>`:PROTO[s.kind](brief);const m={role:'assistant',type:'artifact',skill:used,title:deriveTitle(used,brief),body,id:uid(),author:'Арман'};c.messages.push(m);
      state.artifacts.unshift({skill:used,title:m.title,author:'Арман',initials:'АР',when:'только что',status:'done',chatId:c.id,projectId:c.projectId});}
    else{c.messages.push({role:'assistant',type:'text',html:freeReply(text)});}
    renderThread();},used?950:750);
}
function deriveTitle(skill,brief){const s=SKILLS[skill];if(brief&&brief.length<48&&s.kind==='doc')return s.name+': '+brief;
  switch(skill){case 'comp':return 'Конкурентный анализ: '+(brief||comps()[0]||'Monzo');case 'mobile':return 'Мобильный прототип: '+(brief||'накопительный счёт');case 'web':return 'Веб-компонент: '+(brief||'настройки накоплений');case 'landing':return 'Лендинг: '+(brief||'Накопления');case 'visual':return 'Визуал: '+(brief||'Накопления');default:return s.name;}}

function taskCard(e){const[id,s]=e;const c=CATS.find(x=>x.id===s.cat);return`<button class="gal-skill" onclick="arm('${id}')"><div class="gal-ico">${s.ico}</div><div><div class="gal-t">${s.name}</div><div class="gal-d">${s.desc}</div><span class="gal-badge2">${esc(c?c.name:'')}</span>${s.kind!=='doc'?'<span class="gal-badge">живое превью</span>':''}</div></button>`;}
function renderTaskResults(){
  const q=state.taskQuery.toLowerCase().trim();const cat=state.taskCat;
  const chips=[`<button class="av-f ${cat==='all'?'on':''}" onclick="setTaskCat('all')">Все</button>`].concat(CATS.map(c=>`<button class="av-f ${cat===c.id?'on':''}" onclick="setTaskCat('${c.id}')">${esc(c.name)}</button>`)).join('');
  const all=Object.entries(SKILLS);
  const match=e=>(cat==='all'||e[1].cat===cat)&&(!q||e[1].name.toLowerCase().includes(q)||e[1].desc.toLowerCase().includes(q));
  let groups='';
  for(const c of CATS){
    if(cat!=='all'&&cat!==c.id)continue;
    const items=all.filter(e=>e[1].cat===c.id&&match(e));
    if(!items.length)continue;
    groups+=`<div class="gal-cat">${c.name}<span class="ln"></span></div><div class="gal-grid">${items.map(taskCard).join('')}</div>`;
  }
  if(!groups)groups=`<div style="padding:42px;text-align:center;color:var(--ink-3);font-size:14px">Ничего не найдено по запросу «${esc(state.taskQuery)}». Попробуйте другое слово.</div>`;
  const recent=(!q&&state.recentTasks.length)?`<div class="gal-cat">Недавние задачи<span class="ln"></span></div><div class="gal-grid">${state.recentTasks.filter(id=>SKILLS[id]).map(id=>taskCard([id,SKILLS[id]])).join('')}</div>`:'';
  document.getElementById('taskResults').innerHTML=`<div class="av-filters" style="margin-top:4px">${chips}</div>${recent}${groups}`;
}

      const title=deriveTitle(t.skill,t.brief);
      const chat={id:uid(),title,ico:sk.ico,when:t.when,projectId:proj.id,messages:[{role:'user',text:t.text,skill:t.skill,by:t.by},{role:'assistant',type:'artifact',skill:t.skill,title,body,id:uid(),author:t.author}]};
      state.chats.push(chat);proj.chatIds.push(chat.id);
      state.artifacts.push({skill:t.skill,title,author:t.author,initials:t.by,when:t.when,status:t.status,chatId:chat.id,projectId:proj.id});
    });
  });
  // sort artifacts by recency-ish (keep seed order, savings first)
}

document.getElementById('taskCount').textContent=Object.keys(SKILLS).length;
buildSeed();
state.recentTasks=['gtm','sql','codereview','mobile','comp','synth'];
renderProjList();renderChats();
goView('dashboard');
</script>
